<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;family=Geist:wght@400;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-container": "#98805d",
                    "text-primary": "#0F172A",
                    "tertiary": "#000000",
                    "primary-container": "#131b2e",
                    "surface-container-high": "#eae7e9",
                    "pending": "#F59E0B",
                    "surface-variant": "#e4e2e4",
                    "on-secondary-container": "#54647a",
                    "secondary": "#505f76",
                    "outline": "#76777d",
                    "surface-bright": "#fcf8fa",
                    "on-error-container": "#93000a",
                    "tertiary-fixed-dim": "#dec29a",
                    "on-primary-container": "#7c839b",
                    "on-tertiary-fixed-variant": "#574425",
                    "on-secondary-fixed": "#0b1c30",
                    "tertiary-fixed": "#fcdeb5",
                    "primary-fixed-dim": "#bec6e0",
                    "inverse-on-surface": "#f3f0f2",
                    "text-secondary": "#475569",
                    "on-tertiary-fixed": "#271901",
                    "surface-dim": "#dcd9db",
                    "tertiary-container": "#271901",
                    "surface-container": "#f0edef",
                    "error": "#EF4444",
                    "secondary-fixed-dim": "#b7c8e1",
                    "on-surface-variant": "#45464d",
                    "background": "#F8FAFC",
                    "on-tertiary": "#ffffff",
                    "on-primary-fixed": "#131b2e",
                    "outline-variant": "#c6c6cd",
                    "on-background": "#1b1b1d",
                    "error-container": "#ffdad6",
                    "surface-container-highest": "#e4e2e4",
                    "surface-container-lowest": "#ffffff",
                    "on-primary": "#ffffff",
                    "surface-container-low": "#f6f3f5",
                    "text-muted": "#94A3B8",
                    "inverse-primary": "#bec6e0",
                    "on-surface": "#1b1b1d",
                    "inverse-surface": "#303032",
                    "primary-fixed": "#dae2fd",
                    "on-secondary": "#ffffff",
                    "primary": "#000000",
                    "info": "#3B82F6",
                    "secondary-container": "#d0e1fb",
                    "surface": "#FFFFFF",
                    "border": "#E2E8F0",
                    "success": "#10B981",
                    "on-secondary-fixed-variant": "#38485d",
                    "secondary-fixed": "#d3e4fe",
                    "on-error": "#ffffff",
                    "surface-tint": "#565e74",
                    "on-primary-fixed-variant": "#3f465c"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "stack-gap": "1rem",
                    "sidebar-width": "260px",
                    "gutter": "1.5rem",
                    "container-max": "1440px",
                    "card-padding": "1.25rem",
                    "sidebar-collapsed": "80px"
            },
            "fontFamily": {
                    "h2": ["Geist"],
                    "h1": ["Geist"],
                    "data-tabular": ["Geist"],
                    "body-base": ["Inter"],
                    "h3": ["Geist"],
                    "body-sm": ["Inter"],
                    "label-caps": ["Inter"]
            },
            "fontSize": {
                    "h2": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "h1": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                    "data-tabular": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "body-base": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "h3": ["16px", {"lineHeight": "24px", "fontWeight": "600"}],
                    "body-sm": ["13px", {"lineHeight": "18px", "fontWeight": "400"}],
                    "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #F8FAFC;
        }
    </style>
</head>
<body class="antialiased text-text-primary">
<main class="min-h-screen flex items-center justify-center p-gutter relative overflow-hidden">
<!-- Background Pattern -->
<div class="absolute inset-0 z-0 opacity-40 pointer-events-none">
<div class="absolute inset-0 bg-[radial-gradient(#e2e8f0_1px,transparent_1px)] [background-size:24px_24px]"></div>
</div>
<!-- Auth Card Container -->
<div class="relative z-10 w-full max-w-[400px]">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-8">
<div class="w-12 h-12 bg-primary rounded-lg flex items-center justify-center mb-4 shadow-sm">
<span class="material-symbols-outlined text-on-primary text-[28px]" data-icon="corporate_fare">corporate_fare</span>
</div>
<h1 class="font-h1 text-h1 tracking-tight text-text-primary">Enterprise Portal</h1>
<p class="font-body-base text-body-base text-text-muted mt-1">Management solutions for teams</p>
</div>
<!-- Login Card -->
<div class="bg-surface border border-border rounded-xl shadow-[0px_1px_3px_rgba(15,23,42,0.05)] overflow-hidden">
<div class="p-8">
<div class="mb-6">
<h2 class="font-h2 text-h2 text-text-primary">Welcome back</h2>
<p class="font-body-sm text-body-sm text-text-secondary mt-1">Enter your credentials to access your account</p>
</div>
<form action="#" class="space-y-4" method="POST">
<!-- Email Input -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-text-secondary uppercase tracking-wider" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-text-muted text-[18px]" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 bg-surface-container-lowest border border-border rounded-lg font-body-base text-body-base placeholder:text-text-muted focus:outline-none focus:ring-2 focus:ring-info/20 focus:border-info transition-all" id="email" name="email" placeholder="name@organization.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-text-secondary uppercase tracking-wider" for="password">Password</label>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-text-muted text-[18px]" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 bg-surface-container-lowest border border-border rounded-lg font-body-base text-body-base placeholder:text-text-muted focus:outline-none focus:ring-2 focus:ring-info/20 focus:border-info transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Additional Options -->
<div class="flex items-center justify-between py-1">
<div class="flex items-center">
<input class="h-4 w-4 rounded border-border text-primary focus:ring-primary" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-sm text-body-sm text-text-secondary" for="remember-me">
                                    Remember me
                                </label>
</div>
<div class="text-sm">
<a class="font-body-sm text-body-sm text-info hover:underline" href="#">
                                    Forgot password?
                                </a>
</div>
</div>
<!-- Login Button -->
<button class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm font-h3 text-h3 text-on-primary bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all active:scale-[0.98]" type="submit">
                            Login
                        </button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-border"></div>
</div>
<div class="relative flex justify-center text-xs">
<span class="px-2 bg-surface text-text-muted font-body-sm uppercase tracking-widest">or sign in with</span>
</div>
</div>
<!-- SSO Buttons -->
<div class="grid grid-cols-2 gap-3">
<button class="flex items-center justify-center gap-2 px-4 py-2 border border-border rounded-lg bg-surface hover:bg-surface-container-low transition-colors active:scale-[0.98]" type="button">
<span class="material-symbols-outlined text-[18px]" data-icon="google">google</span>
<span class="font-body-base text-body-base">Google</span>
</button>
<button class="flex items-center justify-center gap-2 px-4 py-2 border border-border rounded-lg bg-surface hover:bg-surface-container-low transition-colors active:scale-[0.98]" type="button">
<span class="material-symbols-outlined text-[18px]" data-icon="key">key</span>
<span class="font-body-base text-body-base">SSO</span>
</button>
</div>
</div>
<!-- Footer Info -->
<div class="px-8 py-4 bg-surface-container-low border-t border-border flex justify-center">
<p class="font-body-sm text-body-sm text-text-secondary">
                        Don't have an account? <a class="text-info font-medium hover:underline" href="#">Contact IT Support</a>
</p>
</div>
</div>
<!-- Global Footer Links -->
<div class="mt-8 flex justify-center gap-6">
<a class="font-body-sm text-body-sm text-text-muted hover:text-text-primary transition-colors" href="#">Privacy Policy</a>
<a class="font-body-sm text-body-sm text-text-muted hover:text-text-primary transition-colors" href="#">Terms of Service</a>
<a class="font-body-sm text-body-sm text-text-muted hover:text-text-primary transition-colors" href="#">Help Center</a>
</div>
</div>
</main>
<!-- Visual Polish Elements -->
<div class="fixed bottom-0 right-0 p-gutter pointer-events-none opacity-10">
<span class="material-symbols-outlined text-[120px]" data-icon="shield_person">shield_person</span>
</div>
</body></html>
